services:
  - type: web
    name: fangzhi-backend
    env: python
    plan: free
    rootDir: gift_tracker
    buildCommand: pip install -r requirements.txt
    startCommand: python manage.py migrate && python manage.py ensure_demo_user && gunicorn gift_tracker.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True"
      - key: WENMO_TIANJI_API_URL
        sync: false
      - key: WENMO_TIANJI_API_KEY
        sync: false
      - key: DEMO_USERNAME
        value: "demo"
      - key: DEMO_PASSWORD
        sync: false
      - key: DEMO_EMAIL
        value: "demo@example.com"

  - type: static
    name: fangzhi-frontend
    rootDir: gift_tracker/frontend-spa
    buildCommand: |
      if [ -n "$BACKEND_API_BASE" ]; then
        printf 'window.__GIFT_API_BASE__ = "%s";\n' "$BACKEND_API_BASE" > config.runtime.js
      fi
    staticPublishPath: .
    envVars:
      - key: BACKEND_API_BASE
        sync: false
